<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard de Vendas</title>
<style>
  :root{--bg:#eef1f5;--azul:#185FA5;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}

  /* Barra de versão (topo) */
  .verbar{display:flex;align-items:center;gap:14px;background:#0f2f52;color:#fff;
          padding:9px 18px;flex-shrink:0;box-shadow:0 2px 10px rgba(0,0,0,.25);z-index:10}
  .verbar .brand{font-weight:700;font-size:15px;letter-spacing:.3px;white-space:nowrap}
  .verbar .switch{display:flex;background:rgba(255,255,255,.10);border-radius:9px;padding:3px;gap:3px}
  .verbar .switch button{border:0;background:transparent;color:#cdd8e6;font-weight:600;font-size:13px;
          padding:7px 18px;border-radius:7px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:7px}
  .verbar .switch button:hover{color:#fff}
  .verbar .switch button.active{background:#fff;color:#0f2f52}
  .verbar .tag{font-size:10px;background:#D85A30;color:#fff;padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:.4px}
  .verbar .switch button.active .tag{background:#D85A30}
  .verbar .spacer{flex:1}
  .verbar #verHint{font-size:12px;color:#9fb4cc;white-space:nowrap}

  iframe{flex:1;width:100%;border:0;background:var(--bg)}

  /* Login */
  #login-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
  #login-overlay.hidden{display:none}
  .login-box{background:#fff;padding:34px 40px;border-radius:14px;box-shadow:0 12px 44px rgba(0,0,0,.16);text-align:center;max-width:340px;width:90%}
  .login-box h1{font-size:19px;color:var(--azul);margin-bottom:6px}
  .login-box p{font-size:13px;color:#667;margin-bottom:18px}
  .login-box input{width:100%;padding:11px 14px;border:1.5px solid #ccd3dd;border-radius:8px;font-size:15px;text-align:center;margin-bottom:10px;outline:none}
  .login-box input:focus{border-color:var(--azul)}
  .login-box button{width:100%;padding:11px;border:0;border-radius:8px;background:var(--azul);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
  #login-error{color:#c0392b;font-size:12px;min-height:16px;margin-top:4px}

  @media(max-width:640px){
    .verbar{gap:8px;padding:8px 10px}
    .verbar .brand{font-size:13px}
    .verbar #verHint{display:none}
    .verbar .switch button{padding:6px 11px;font-size:12px}
  }
</style>
</head>
<body>
  <div id="login-overlay">
    <div class="login-box">
      <h1>Vendas Diária 2026</h1>
      <p>Acesso restrito — Comercial Digital</p>
      <input id="login-input" type="password" placeholder="Senha" autocomplete="current-password">
      <button onclick="checkLogin()">Entrar</button>
      <div id="login-error"></div>
    </div>
  </div>

  <div class="verbar">
    <span class="brand">📊 Vendas Diária 2026</span>
    <div class="switch">
      <button id="btnV1" class="active" onclick="setVer('v1')">V1 · Atual</button>
      <button id="btnV2" onclick="setVer('v2')">V2 · Nova <span class="tag">BETA</span></button>
    </div>
    <span class="spacer"></span>
    <span id="verHint"></span>
  </div>
  <iframe id="frame" title="Dashboard de Vendas"></iframe>

<script>
  const SRC  = { v1: 'v1.html', v2: 'v2.html' };
  const HINT = { v1: 'Versão em produção', v2: 'Prévia das alterações — em avaliação' };
  const KEY  = 'vendasdiaria_auth';
  let cur = null;

  function setVer(v){
    if(v === cur) return;
    cur = v;
    document.getElementById('frame').src = SRC[v];
    document.getElementById('btnV1').classList.toggle('active', v === 'v1');
    document.getElementById('btnV2').classList.toggle('active', v === 'v2');
    document.getElementById('verHint').textContent = HINT[v];
  }
  // carrega a versão só depois do login (evita 2º pedido de senha dentro do iframe)
  function boot(){ setVer('v1'); }

  (function(){
    if(sessionStorage.getItem(KEY) === '1'){
      document.getElementById('login-overlay').classList.add('hidden');
      boot();
    }
    document.getElementById('login-input').addEventListener('keydown', function(e){
      if(e.key === 'Enter') checkLogin();
    });
    document.getElementById('login-input').focus();
  })();

  function checkLogin(){
    const val = document.getElementById('login-input').value;
    if(val === 'hapvida1234'){
      sessionStorage.setItem(KEY, '1');
      document.getElementById('login-overlay').classList.add('hidden');
      boot();
    } else {
      document.getElementById('login-error').textContent = 'Senha incorreta. Tente novamente.';
      document.getElementById('login-input').value = '';
      document.getElementById('login-input').focus();
    }
  }
</script>
</body>
</html>
